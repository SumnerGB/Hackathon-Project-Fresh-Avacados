<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marist Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("marist_other.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .marist-card {
            background: linear-gradient(135deg, #b30000, #ff1a1a);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(179, 0, 0, 0.35);
            color: white;
            width: 420px;
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header img {
            height: 90px;
            width: 90px;
            background: white;
            padding: 5px;
            border-radius: 12px;
        }

        .header h1 {
            font-size: 50px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 10px;
            border: none;
            outline: none;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        button.login-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            color: #b30000;
            transition: 0.2s;
        }

        button.login-btn:hover {
            background: #ffe5e5;
            transform: scale(1.03);
        }

        /* Register button style */
        .register-container {
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        .register-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .register-btn:hover {
            background: white;
            color: #b30000;
        }
    </style>
</head>
<body>
    <div class="marist-card">
        <!-- Header -->
        <div class="header">
            <img src="Marist_Shield.jpg" alt="Marist">
            <h1>Marist</h1>
        </div>

        <!-- LOGIN Form -->
        <form action="login" method="POST">
            <label>Username</label>
            <input type="text" name="uname" required>

            <label>Password</label>
            <input type="password" name="psw" required>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- Register Button -->
        <div class="register-container">
            <p>Don't have an account?</p>
            <!-- Change 'register.html' to your actual register page file -->
            <a href="register.html" class="register-btn">Register</a>
        </div>
    </div>
</body>
</html>
