<!DOCTYPE html>
<html>
<head>
<title>Marist Hours</title>

<style>
.view-container { display:none; }
.view-container.active { display:block; }

.teacher-indicator {
  position: fixed;
  bottom: 10px;
  left: 10px;
  width: 20px;
  height: 20px;
  background: black;
  z-index: 9999;
}

.schedule table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  border:1px solid black;
}

.schedule th, .schedule td {
  border:1px solid black;
}

.schedule thead th {
  background:red;
  color:white;
}

.draggable-block {
  padding:10px;
  margin:5px;
  background:#4CAF50;
  color:white;
  cursor:grab;
  display:inline-block;
}

.scheduled-block {
  position:absolute;
  background:#2196F3;
  color:white;
  padding:5px;
  font-size:12px;
  width:90%;
  left:5%;
  top:0;
}

.preset-button.active {
  background:#4CAF50;
  color:white;
}
</style>

<script>
function getViewMode() {
  return new URLSearchParams(window.location.search).get("view");
}

function logout() {
  sessionStorage.clear();
  location.href = "/";
}
</script>

</head>

<body>

<button onclick="logout()" style="background:red;color:white;">
  Log Out
</button>

<div class="teacher-indicator" style="display:none;"></div>

<div class="w3-container w3-teal">
  <h1>Marist Weekly Schedule</h1>
</div>

<!-- STUDENT VIEW -->
<div id="student-view" class="view-container active">
  <div class="schedule"></div>
  <div id="studentPresetsContainer"></div>
</div>

<!-- TEACHER VIEW -->
<div id="teacher-view" class="view-container">

  <div class="schedule"></div>

  <div>
    <div class="draggable-block" data-duration="15" draggable="true">15 min</div>
    <div class="draggable-block" data-duration="30" draggable="true">30 min</div>
    <div class="draggable-block" data-duration="45" draggable="true">45 min</div>
    <div class="draggable-block" data-duration="60" draggable="true">1 hour</div>
  </div>

  <button id="savePresetBtn">Save Preset</button>

  <label>Teacher</label>
  <input id="teacher">

  <label>Time</label>
  <input id="time">

  <div id="officeHoursContainer"></div>

</div>

<button id="changeViewBtn">Change View</button>

<script>

let teacher = false;
let draggedElement = null;
let activePresets = new Set();

const studentView = document.getElementById("student-view");
const teacherView = document.getElementById("teacher-view");
const indicator = document.querySelector(".teacher-indicator");

function getUser() {
  return sessionStorage.getItem("username") || localStorage.getItem("username");
}

/* VIEW SYSTEM */
function initView() {
  const v = getViewMode();
  teacher = (v === "teacher");
  switchView();
}

function switchView() {
  if (teacher) {
    studentView.classList.remove("active");
    teacherView.classList.add("active");
    indicator.style.display = "block";
  } else {
    teacherView.classList.remove("active");
    studentView.classList.add("active");
    indicator.style.display = "none";
    displayPresets();
  }
}

/* OFFICE HOURS (FIXED + COMBINED) */
function addOfficeHour() {
  const teacherName = document.getElementById("teacher")?.value;
  const time = document.getElementById("time")?.value;

  if (!teacherName || !time) return;

  let list = JSON.parse(localStorage.getItem("officeHours") || "[]");

  list.push({
    id: Date.now(),
    teacherName,
    time
  });

  localStorage.setItem("officeHours", JSON.stringify(list));
  renderOfficeHours();
}

function renderOfficeHours() {
  const container = document.getElementById("officeHoursContainer");
  if (!container) return;

  const list = JSON.parse(localStorage.getItem("officeHours") || "[]");

  container.innerHTML = "<h3>Office Hours</h3>";

  list.forEach(o => {
    const div = document.createElement("div");
    div.innerHTML = `
      ${o.teacherName} - ${o.time}
      <button onclick="deleteOfficeHour(${o.id})">Delete</button>
    `;
    container.appendChild(div);
  });
}

function deleteOfficeHour(id) {
  let list = JSON.parse(localStorage.getItem("officeHours") || "[]");
  list = list.filter(x => x.id !== id);
  localStorage.setItem("officeHours", JSON.stringify(list));
  renderOfficeHours();
}

/* PRESETS (FIXED OWNER BUG) */
function savePreset() {
  const name = prompt("Preset name?");
  if (!name) return;

  const username = getUser();

  const data = {
    owner: username,
    blocks: []
  };

  let all = JSON.parse(localStorage.getItem("presets") || "{}");
  all[name] = data;

  localStorage.setItem("presets", JSON.stringify(all));
  displayPresets();
}

function displayPresets() {
  const container = document.getElementById("studentPresetsContainer");
  if (!container) return;

  const all = JSON.parse(localStorage.getItem("presets") || "{}");
  const names = Object.keys(all);

  const username = getUser();

  let html = "<h3>Presets</h3>";

  names.forEach(n => {
    const p = all[n];
    const owner = p.owner === username;

    html += `
      <div>
        <button onclick="togglePreset('${n}')">${n}</button>
        ${owner ? `<button onclick="deletePreset('${n}')">Delete</button>` : ""}
      </div>
    `;
  });

  container.innerHTML = html;
}

function togglePreset(name) {
  activePresets.add(name);
}

function deletePreset(name) {
  let all = JSON.parse(localStorage.getItem("presets") || "{}");
  delete all[name];
  localStorage.setItem("presets", JSON.stringify(all));
  displayPresets();
}

/* DRAG & DROP */
document.querySelectorAll(".draggable-block").forEach(b => {
  b.addEventListener("dragstart", e => {
    draggedElement = b;
  });
});

document.getElementById("changeViewBtn").onclick = () => {
  teacher = !teacher;
  switchView();
};

document.getElementById("savePresetBtn")?.addEventListener("click", savePreset);

window.onload = () => {
  initView();
  renderOfficeHours();
};

</script>

</body>
</html>
